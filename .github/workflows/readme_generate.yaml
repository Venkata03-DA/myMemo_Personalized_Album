name: Auto Generate README

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate README
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.README_GENERATE }}
        run: |
          copilot -p "Look at this entire codebase and generate a professional README.md file. Include: project title, description, tech stack, how to run locally, API endpoints if any, environment variables needed, and project structure." \
          --allow-tool='write,shell(find:*),shell(cat:*)' \
          --no-ask-user \
          -s

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'docs: auto-update README via Copilot CLI'
          title: 'docs: auto-generated README'
          body: 'Generated by Copilot CLI. Please review and approve.'
          branch: readme-auto-update
          delete-branch: true