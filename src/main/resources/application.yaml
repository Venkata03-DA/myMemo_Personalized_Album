spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: myMemo
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mymemo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:venkata}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
